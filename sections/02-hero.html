
<!-- ═══ HERO ════════════════════════════════════════════════════════════ -->
<section class="hero" id="home">
  <!-- Scene: inclina com o mouse -->
  <div class="hero__scene" id="heroScene">
    <div class="hero__layer active" data-cat="santiago">
      <video class="hero__video" autoplay muted loop playsinline>
        <source src="https://videos.pexels.com/video-files/14060349/14060349-hd_1920_1080_60fps.mp4" type="video/mp4">
      </video>
    </div>
    <div class="hero__layer" data-cat="atacama">
      <video class="hero__video" autoplay muted loop playsinline>
        <source src="https://videos.pexels.com/video-files/33655180/14300588_2560_1440_60fps.mp4" type="video/mp4">
      </video>
    </div>
    <div class="hero__layer" data-cat="andes">
      <video class="hero__video" autoplay muted loop playsinline>
        <source src="https://videos.pexels.com/video-files/33665914/14303744_1920_1080_59fps.mp4" type="video/mp4">
      </video>
    </div>
    <div class="hero__layer" data-cat="vinicolas">
      <video class="hero__video" autoplay muted loop playsinline>
        <source src="https://videos.pexels.com/video-files/4820996/4820996-hd_1920_1080_30fps.mp4" type="video/mp4">
      </video>
    </div>
    <div class="hero__layer" data-cat="neve">
      <video class="hero__video" autoplay muted loop playsinline>
        <source src="https://videos.pexels.com/video-files/35689466/15125776_1920_1080_60fps.mp4" type="video/mp4">
      </video>
    </div>
    <div class="hero__stamps"></div>
  </div>

  <!-- Tabs Faroe-style: só ícone SVG + label, sem texto no hero -->
  <div class="hero__tabs" id="heroTabs">

    <!-- Santiago — skyline cidade -->
    <button class="hero__tab active" data-cat="santiago" onclick="switchCat('santiago')">
      <span class="hero__tab-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <polyline points="2,36 2,22 10,22 10,14 16,14 16,8 24,8 24,14 30,14 30,22 38,22 38,36"/>
          <line x1="2" y1="36" x2="38" y2="36"/>
          <rect x="17" y="12" width="6" height="4"/>
        </svg>
      </span>
      <span class="hero__tab-label">Santiago</span>
    </button>

    <!-- Atacama — sol com raios -->
    <button class="hero__tab" data-cat="atacama" onclick="switchCat('atacama')">
      <span class="hero__tab-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="7"/>
          <line x1="20" y1="4" x2="20" y2="9"/>
          <line x1="20" y1="31" x2="20" y2="36"/>
          <line x1="4" y1="20" x2="9" y2="20"/>
          <line x1="31" y1="20" x2="36" y2="20"/>
          <line x1="8.4" y1="8.4" x2="12" y2="12"/>
          <line x1="28" y1="28" x2="31.6" y2="31.6"/>
          <line x1="31.6" y1="8.4" x2="28" y2="12"/>
          <line x1="12" y1="28" x2="8.4" y2="31.6"/>
        </svg>
      </span>
      <span class="hero__tab-label">Atacama</span>
    </button>

    <!-- Andes — duas montanhas sobrepostas -->
    <button class="hero__tab" data-cat="andes" onclick="switchCat('andes')">
      <span class="hero__tab-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <polyline points="2,35 15,8 28,35"/>
          <polyline points="18,35 28,16 38,35"/>
          <line x1="2" y1="35" x2="38" y2="35"/>
          <polyline points="11,22 15,17 19,22"/>
        </svg>
      </span>
      <span class="hero__tab-label">Andes</span>
    </button>

    <!-- Vinícolas — taça de vinho -->
    <button class="hero__tab" data-cat="vinicolas" onclick="switchCat('vinicolas')">
      <span class="hero__tab-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <path d="M11,5 L29,5 L27,16 Q27,25 20,25 Q13,25 13,16 Z"/>
          <line x1="20" y1="25" x2="20" y2="34"/>
          <line x1="13" y1="34" x2="27" y2="34"/>
        </svg>
      </span>
      <span class="hero__tab-label">Vinícolas</span>
    </button>

    <!-- Neve — floco de neve -->
    <button class="hero__tab" data-cat="neve" onclick="switchCat('neve')">
      <span class="hero__tab-icon">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <line x1="20" y1="4" x2="20" y2="36"/>
          <line x1="4" y1="20" x2="36" y2="20"/>
          <line x1="8.7" y1="8.7" x2="31.3" y2="31.3"/>
          <line x1="31.3" y1="8.7" x2="8.7" y2="31.3"/>
          <polyline points="16,10 20,14 24,10"/>
          <polyline points="16,30 20,26 24,30"/>
          <polyline points="10,16 14,20 10,24"/>
          <polyline points="30,16 26,20 30,24"/>
        </svg>
      </span>
      <span class="hero__tab-label">Neve</span>
    </button>

  </div>
</section>
