<script>
(function () {
  const pill     = document.getElementById('mdockPill');
  const selected = document.getElementById('mdockSelected');
  const input    = document.getElementById('mdockInput');
  const sendBtn  = document.getElementById('mdockSend');
  const chars    = Array.from(document.querySelectorAll('.mdock__char'));

  let activeIdx = null;

  function expand(idx) {
    const btn = chars[idx];
    const gradient = btn.dataset.gradient;
    const emoji    = btn.textContent.trim();
    const name     = btn.getAttribute('aria-label').replace('Message ', '');

    btn.classList.add('char--active');
    selected.textContent = emoji;
    pill.style.background = `linear-gradient(to right, ${gradient})`;
    pill.classList.add('is-expanded');
    input.placeholder = `Mensagem ${name}...`;
    input.focus();
    activeIdx = idx;
  }

  function collapse() {
    if (activeIdx !== null) chars[activeIdx].classList.remove('char--active');
    pill.classList.remove('is-expanded');
    pill.style.background = '';
    input.value = '';
    sendBtn.disabled = true;
    activeIdx = null;
  }

  function send() {
    const msg = input.value.trim();
    if (!msg || activeIdx === null) return;
    console.log('[MessageDock] send:', msg, 'character index:', activeIdx);
    collapse();
  }

  chars.forEach((btn, idx) => {
    btn.addEventListener('click', () => {
      if (activeIdx === idx) { collapse(); return; }
      if (activeIdx !== null) chars[activeIdx].classList.remove('char--active');
      expand(idx);
    });
  });

  selected.addEventListener('click', collapse);

  input.addEventListener('input', () => {
    sendBtn.disabled = !input.value.trim();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') send();
    if (e.key === 'Escape') collapse();
  });

  sendBtn.addEventListener('click', send);

  document.addEventListener('mousedown', e => {
    if (!document.getElementById('messageDock').contains(e.target)) collapse();
  });

  // Aparece só depois que o hero de vídeo sai da tela
  const dockEl = document.getElementById('messageDock');
  const heroEl = document.getElementById('home');
  if (heroEl && dockEl) {
    const heroObs = new IntersectionObserver(function(entries) {
      const heroVisible = entries[0].isIntersecting;
      dockEl.classList.toggle('is-visible', !heroVisible);
    }, { threshold: 0.05 });
    heroObs.observe(heroEl);
  }
})();
</script>
</body>
</html>
